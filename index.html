<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>La' Vie Dental Health Care</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header class="navbar">

        <div class="brand">

            <img src="images/logo.png"
                 alt="La' Vie Dental Health Care">

            <div class="brand-text">

                <div class="lavie">
                    La' Vie
                </div>

                <div class="clinic-name">
                    DENTAL HEALTH CARE
                </div>

            </div>

        </div>

        <nav class="nav-links">

            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Services</a>
            <a href="#">Gallery</a>
            <a href="#">Smile Journal</a>
            <a href="#">Contact</a>

        </nav>

    </header>

    <!-- HERO SECTION -->

    <section class="hero">

        <div class="hero-left">

            <div class="hero-accent"></div>

            <h1>
                Where Your Smile
                <br>
                Finds Elegance
            </h1>

            <p>
                Advanced Dentistry.
                Personalized Care.
                Beautiful Smiles.
            </p>

            <div class="hero-buttons">

                <a href="#contact"
                   class="primary-btn">

                    Book Appointment

                </a>

                <a href="tel:+917795560698"
                   class="call-btn">

                    Call Now

                </a>

            </div>

        </div>

        <div class="hero-right">

            <div class="hero-slider">

                <img src="images/hi.jpeg"
                     class="hero-slide active"
                     alt="Clinic Exterior">

                <img src="images/interior.jpeg"
                     class="hero-slide"
                     alt="Clinic Interior">

                <img src="images/glass.jpeg"
                     class="hero-slide"
                     alt="Branding Wall">

                <img src="images/int 3.jpeg"
                     class="hero-slide"
                     alt="Clinic Interior">

            </div>

        </div>

    </section>

    <!-- FLOATING WHATSAPP -->

    <a href="https://wa.me/917795560698"
       target="_blank"
       class="floating-whatsapp">

        <i class="fa-brands fa-whatsapp"></i>

    </a>

    <script src="js/script.js"></script>
